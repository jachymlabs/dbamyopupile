name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build + e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Storefront uses these at build/runtime — pin them so the build is
      # deterministic in CI (same-origin check, no leak to real Vendure).
      VENDURE_API_URL: http://localhost:9999/shop-api
      VENDURE_CHANNEL_TOKEN: mock-token
      PUBLIC_SITE_URL: http://localhost:4322

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Lint (ESLint — no-undef + Astro)
        run: npm run lint

      - name: Typecheck (astro check — full)
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14
